actions:
  apisYmlUpdated: true
  openapiPath: ""
  reason: |
    Identity-only bootstrap. No public API surface exists to catalog, so apis[]
    is empty and no OpenAPI was harvested. common[] carries only verified live
    links (website, about, legal, support, and confirmed social profiles).
