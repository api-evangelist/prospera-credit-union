name: Prospera Credit Union
kind: company
description: Prospera Credit Union is a member-owned cooperative financial institution
  headquartered in British Columbia, Canada, formed on January 1, 2020 through the
  merger of the original Prospera Credit Union and Westminster Savings Credit Union
  — the largest credit-union merger in Canadian history. With roughly CA$9 billion
  in assets under management, about 120,000 members, and some 900 employees across
  branches in Metro Vancouver, the Fraser Valley, and the Okanagan, it is the third
  largest credit union in British Columbia and among the six largest in Canada. As
  a provincially regulated cooperative (credit unions in BC are overseen by BC
  Financial Services Authority and deposits are protected by the Credit Union Deposit
  Insurance Corporation of BC), Prospera serves personal and business members with
  chequing and savings accounts, credit cards, mortgages, loans, and Interac
  e-Transfer. On the open-finance side, Prospera runs NO public first-party developer
  portal or documented API — none of developer/api/developers.prospera.ca resolve —
  and Canada's federal Consumer-Driven Banking (open-banking) framework, legislated
  in Budget 2024 and overseen by the FCAC, is not yet operational. Like most
  Canadian credit unions, Prospera reaches national payment rails and consumer
  data-sharing through shared credit-union-system infrastructure rather than a
  proprietary API, and third-party data access today is aggregator/screen-scraping
  based (e.g. Flinks, Plaid). This is an honest identity-only profile with no public
  API surface to catalog.
